spring:
  application:
    name: app-consumer
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: fraud-event-consumer
      enable-auto-commit: false
      auto-offset-reset: earliest
  flyway:
    enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/fraud
    username: fraud
    password: fraud
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms

fraud:
  sliding-window:
    window: 5m
    max-events: 5
    amount-threshold: 3000000
    ttl: 10m

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
